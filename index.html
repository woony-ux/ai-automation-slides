<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 자동화 실전 공유 - Ian</title>
<style>
  /* (기존 스타일 시트와 동일하여 생략, 실제 파일에는 포함되어 있습니다) */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #0f0f14; color: #f0f0f0; height: 100vh; overflow: hidden; }
  .deck { width: 100%; height: 100vh; position: relative; }
  .slide { position: absolute; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 60px 60px 80px; opacity: 0; transition: opacity 0.4s; }
  .slide.active { display: flex; opacity: 1; }
  .nav { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 16px; z-index: 100; }
  .nav button { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #f0f0f0; padding: 10px 24px; border-radius: 999px; font-size: 14px; cursor: pointer; }
  .nav button:hover { background: rgba(255,255,255,0.15); }
  .nav .counter { font-size: 13px; color: rgba(255,255,255,0.4); min-width: 60px; text-align: center; }
  .progress { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, #7c6ef7, #5dc9a5); transition: width 0.4s; z-index: 1000; }
  .tag { display: inline-block; font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 999px; margin-bottom: 16px; letter-spacing: 0.05em; text-transform: uppercase; }
  .tag-purple { background: rgba(124,110,247,0.2); color: #a99ff5; border: 1px solid rgba(124,110,247,0.3); }
  .tag-teal { background: rgba(93,202,165,0.15); color: #5dcaa5; border: 1px solid rgba(93,202,165,0.25); }
  .tag-amber { background: rgba(239,159,39,0.15); color: #efb850; border: 1px solid rgba(239,159,39,0.25); }
  h1 { font-size: 48px; font-weight: 700; line-height: 1.2; text-align: center; }
  h2 { font-size: 34px; font-weight: 700; line-height: 1.3; text-align: center; }
  .sub { font-size: 17px; color: rgba(255,255,255,0.5); text-align: center; margin-top: 12px; line-height: 1.6; }
  .accent { color: #a99ff5; }
  .accent-teal { color: #5dcaa5; }
  .card-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; width: 100%; max-width: 860px; margin-top: 16px; }
  .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px 20px; }
  .card .num { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .card h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: #fff; }
  .card p { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.6; }
  .step-list { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
  .step { display: flex; align-items: flex-start; gap: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px 18px; }
  .step .snum { width: 26px; height: 26px; min-width: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; background: rgba(124,110,247,0.25); color: #a99ff5; }
  .step .stxt { font-size: 14px; color: rgba(255,255,255,0.75); line-height: 1.6; }
  .step .stxt strong { color: #fff; font-weight: 600; }
  .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; width: 100%; margin-top: 8px; }
  .col { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 22px; }
  .col .ctag { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; margin-bottom: 12px; display: inline-block; }
  .col ul { list-style: none; padding: 0; }
  .col ul li { font-size: 13px; color: rgba(255,255,255,0.6); padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.06); line-height: 1.5; }
  .col ul li::before { content: '→ '; color: rgba(255,255,255,0.25); }
  .kw-box { background: rgba(93,202,165,0.08); border: 1px solid rgba(93,202,165,0.25); border-radius: 12px; padding: 18px 24px; margin-top: 12px; max-width: 680px; width: 100%; text-align: center; }
  .kw-box .kw { font-size: 18px; font-weight: 700; color: #5dcaa5; margin-bottom: 6px; }
  .kw-box p { font-size: 13px; color: rgba(255,255,255,0.5); }
  .big-quote { max-width: 680px; text-align: center; }
  .big-quote .qmark { font-size: 60px; color: rgba(124,110,247,0.3); line-height: 0.8; margin-bottom: 16px; font-family: Georgia, serif; }
  .big-quote blockquote { font-size: 22px; font-weight: 500; color: #fff; line-height: 1.6; }
  .big-quote .qsub { font-size: 14px; color: rgba(255,255,255,0.4); margin-top: 14px; }
  .outro-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; max-width: 760px; width: 100%; margin-top: 16px; }
  .outro-pill { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 16px; text-align: center; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.7); }
  .cta-box { margin-top: 24px; background: rgba(124,110,247,0.12); border: 1px solid rgba(124,110,247,0.3); border-radius: 16px; padding: 24px 40px; text-align: center; max-width: 480px; width: 100%; }
  .cta-box h3 { color: #a99ff5; font-size: 20px; margin-bottom: 8px; }
  .cta-box p { font-size: 14px; color: rgba(255,255,255,0.55); }
  .btn-primary { display: block; margin-top: 20px; text-decoration: none; background: rgba(124,110,247,0.1); border: 1.5px solid rgba(124,110,247,0.4); border-radius: 12px; padding: 14px 40px; text-align: center; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: rgba(124,110,247,0.25); }
  .btn-primary .btn-label { font-size: 16px; font-weight: 700; color: #a99ff5; }
  .btn-primary .btn-sub { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 4px; }
  .btn-amber { display: block; margin-top: 20px; text-decoration: none; background: rgba(239,159,39,0.1); border: 1.5px solid rgba(239,159,39,0.4); border-radius: 12px; padding: 14px 40px; text-align: center; cursor: pointer; transition: background 0.2s; }
  .btn-amber:hover { background: rgba(239,159,39,0.25); }
  .btn-amber .btn-label { font-size: 16px; font-weight: 700; color: #efb850; }
  .btn-amber .btn-sub { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 4px; }
  .info-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px 18px; }
  .info-card h5 { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
  .info-card p { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.65; }
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
  .metric { text-align: center; padding: 10px 0; }
  .metric .mv { font-size: 28px; font-weight: 700; }
  .metric .ml { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 3px; }
  .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .pill { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.04); }
  .proj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 900px; margin-top: 16px; }
  .ph { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .ov-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; width: 100%; max-width: 940px; margin-top: 20px; }
  .ov-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px 12px; cursor: pointer; transition: border-color .2s, transform .2s; }
  .ov-card:hover { border-color: rgba(255,255,255,0.25); transform: translateY(-2px); }
  .ov-bar { height: 2px; border-radius: 2px; margin-bottom: 10px; }
  .ov-num { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.35); letter-spacing: .06em; margin-bottom: 6px; }
  .ov-title { font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; color: #fff; }
  .ov-who { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 6px; line-height: 1.4; }
</style>
</head>
<body>
<div class="progress" id="prog"></div>
<div class="deck">

  <div class="slide active"><h1>코딩 없이 시작하는 AI 자동화</h1><p class="sub">문과생 Ian과 함께</p></div>

  <div class="slide">
    <div class="tag tag-teal">02 — 초급 자동화</div>
    <h2>마법의 키워드 2가지</h2>
    <div class="step-list">
      <div class="step">
        <div class="snum">1</div>
        <div class="stxt">"찐 초보자라고 생각하고, Step by Step으로 알려줘"</div>
      </div>
    </div>
    <div style="display:flex; gap:12px; margin-top:20px; max-width:680px; width:100%;">
      <button class="btn-primary" style="flex:1;" onclick="copyAndGo()">실행해보기</button>
      <a class="btn-primary" style="flex:1;" href="#" onclick="showIanMsg(); return false;">
        <div class="btn-label">고객 VOC 크롤러 구조도 →</div>
        <div class="btn-sub">구조도는 Ian의 컴퓨터에...</div>
      </a>
    </div>
  </div>

  <div class="slide">
    <div class="tag tag-purple">실제 적용 사례</div>
    <h2>말로 설명할 수 있으면 대부분 자동화 가능</h2>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; max-width:900px; width:100%; margin-top:20px;">
      <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(124,110,247,0.25); border-radius:14px; padding:22px;">
        <p style="font-size:16px; font-weight:700; color:#a99ff5; margin-bottom:12px;">Aura_apt</p>
        <div style="display:flex; gap:8px;">
          <a href="#" onclick="showIanMsg(); return false;" style="flex:1; text-decoration:none; background:rgba(124,110,247,0.1); border:1px solid rgba(124,110,247,0.35); border-radius:8px; padding:10px 8px; text-align:center;">
            <p style="font-size:12px; font-weight:700; color:#a99ff5; margin:0;">구조도 →</p>
          </a>
          <a href="https://aura-apt.vercel.app/" target="_blank" style="flex:1; text-decoration:none; background:rgba(93,202,165,0.08); border:1px solid rgba(93,202,165,0.3); border-radius:8px; padding:10px 8px; text-align:center;">
            <p style="font-size:12px; font-weight:700; color:#5dcaa5; margin:0;">활용 →</p>
          </a>
        </div>
      </div>

      <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(239,159,39,0.25); border-radius:14px; padding:22px;">
        <p style="font-size:16px; font-weight:700; color:#efb850; margin-bottom:12px;">완속 보조금 신청 자동화</p>
        <div style="display:flex; gap:8px;">
          <a href="#" onclick="showIanMsg(); return false;" style="flex:1; text-decoration:none; background:rgba(239,159,39,0.1); border:1px solid rgba(239,159,39,0.35); border-radius:8px; padding:10px 8px; text-align:center;">
            <p style="font-size:12px; font-weight:700; color:#efb850; margin:0;">구조도 →</p>
          </a>
        </div>
      </div>
    </div>
  </div>

  </div>

<div class="nav">
  <button onclick="move(-1)">← 이전</button>
  <span class="counter" id="cnt">1 / 23</span>
  <button onclick="move(1)">다음 →</button>
</div>

<script>
  let cur = 0;
  const slides = document.querySelectorAll('.slide');
  const total = slides.length;

  function go(n) {
    slides[cur].classList.remove('active');
    cur = Math.max(0, Math.min(total - 1, n));
    slides[cur].classList.add('active');
    document.getElementById('cnt').textContent = (cur+1) + ' / ' + total;
    document.getElementById('prog').style.width = ((cur+1)/total*100) + '%';
  }

  // 이 함수가 Ian의 메시지를 띄워줍니다!
  function showIanMsg() {
    alert("구조도는 Ian의 컴퓨터에 있어요. 아쉽게도 지금은 구조도가 보이지 않지만, 궁금하시면 직접 구조도를 만들어보고 #공통-AX채널에 공유해보시면 어때요?");
  }

  function copyText(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }

  function copyAndGo() {
    copyText(`SK일렉링크와 경쟁사 크롤링 시스템을 초보자 입장에서 step by step으로 알려줘`);
    window.open('https://gemini.google.com/app', '_blank');
  }
  
  // (나머지 스크립트 기능 동일하게 유지)
  function move(d) { go(cur + d); }
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') move(1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   move(-1);
  });
  go(0);
</script>
</body>
</html>
